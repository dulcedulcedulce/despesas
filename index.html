<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos Simples</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* TEMA ESCURO DISCRETO */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; 
            color: #dcdcdc; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #262626; 
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #eaeaea;
            font-weight: normal;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .flex-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaaaaa;
        }
        select, input, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #3d3d3d;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
        ::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
            cursor: pointer;
        }
        select, input {
            background-color: #333333;
            color: #dfdfdf;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #5c7080;
        }
        input::placeholder {
            color: #777777;
        }
        
        /* BOTÕES COM CORES DISCRETAS */
        button {
            background-color: #4a5c50; 
            color: #dfdfdf;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3e4d43;
        }
        .btn-export {
            background-color: #455263; 
            margin-top: 0;
        }
        .btn-export:hover {
            background-color: #384352;
        }
        .btn-atualizar {
            background-color: #2b5c8f; 
            margin-top: 0;
        }
        .btn-atualizar:hover {
            background-color: #1e456e;
        }
        .btn-danger {
            background-color: #5c3e3e; 
            color: #d6b4b4;
            width: auto;
            margin-top: 0;
            padding: 10px 15px;
        }
        .btn-danger:hover {
            background-color: #4d3333;
        }
        .btn-add {
            background-color: #4d4d4d; 
            width: auto;
            margin-top: 0;
            white-space: nowrap;
        }
        .btn-add:hover {
            background-color: #404040;
        }
        .btn-excluir-item {
            background: none;
            border: none;
            color: #8c5353;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 5px;
            margin-left: 10px;
            margin-top: 0;
            width: auto;
        }
        .btn-excluir-item:hover {
            background: none;
            color: #d6b4b4;
        }
        
        .chart-container {
            margin-top: 30px;
        }
        hr {
            border: 0;
            height: 1px;
            background: #3d3d3d;
            margin: 20px 0;
        }
        
        /* RESUMO E LISTA DE VALORES */
        .resumo-container {
            margin-top: 25px;
            padding: 15px;
            background-color: #2b2b2b;
            border-radius: 5px;
            border: 1px solid #3d3d3d;
        }
        .resumo-container h3 {
            margin-top: 0;
            font-size: 16px;
            color: #cccccc;
            text-align: center;
            font-weight: normal;
        }
        .resumo-lista {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .resumo-lista li {
            padding: 8px 0;
            border-bottom: 1px dashed #444444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #bbbbbb;
            font-size: 15px;
        }
        .resumo-lista li:last-child {
            border-bottom: none;
        }
        .item-detalhe {
            display: flex;
            align-items: center;
        }
        .total-geral {
            font-size: 16px;
            margin-top: 15px;
            color: #8da693; 
            text-align: center;
            border-top: 1px solid #444444;
            padding-top: 12px;
        }
        
        /* FILTRO DE MÊS */
        .filtro-mes-container {
            background-color: #2e2e2e;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #5c7080;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Controle de Gastos</h2>

        <div class="form-group">
            <label for="categoria">Categoria:</label>
            <div class="flex-group">
                <select id="categoria"></select>
                <button class="btn-danger" onclick="removerCategoria()" title="Apagar categoria selecionada">✕</button>
            </div>
        </div>

        <div class="form-group">
            <label for="dataDespesa">Data:</label>
            <input type="date" id="dataDespesa">
        </div>
        
        <div class="form-group">
            <label for="valor">Valor (R$):</label>
            <input type="number" id="valor" step="0.01" min="0" placeholder="Ex: 50.50">
        </div>

        <button id="btnRegistrar" onclick="adicionarDespesa()">Registrar Despesa</button>
        
        <div class="flex-group" style="margin-top: 10px;">
            <button class="btn-atualizar" id="btnAtualizar" onclick="forcarAtualizacao()">🔄 Atualizar</button>
            <button class="btn-export" onclick="exportarParaTXT()">Baixar backup (.txt)</button>
        </div>

        <hr>

        <div class="form-group flex-group">
            <input type="text" id="novaCategoria" placeholder="Nova categoria (Ex: Roupas)">
            <button class="btn-add" id="btnNovaCat" onclick="adicionarCategoria()">+ Adicionar Categoria</button>
        </div>

        <hr>

        <div class="filtro-mes-container">
            <label for="mesFiltro" style="color: #829ab0;">Analisar Mês/Ano:</label>
            <input type="month" id="mesFiltro" onchange="atualizarGrafico()">
        </div>

        <div class="chart-container">
            <canvas id="graficoGastos"></canvas>
        </div>

        <div id="resumoValores"></div>
        <div id="historicoValores"></div>

    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/33ekix3tm23xo";

        let despesas = [];
        let categorias = [];
        let grafico = null;

        const categoriasPadrao = ['Supermercado', 'Farmácia', 'Contas da Casa', 'Transporte', 'Lazer', 'Outros'];

        window.onload = async function() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            
            document.getElementById('dataDespesa').value = `${ano}-${mes}-${dia}`;
            document.getElementById('mesFiltro').value = `${ano}-${mes}`;

            document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#8da693;">Carregando dados da planilha... ⏳</h3></div>';

            await carregarDados();
        };

        // --- FUNÇÕES DE COMUNICAÇÃO COM O SHEETDB ---

        async function carregarDados() {
            try {
                // 1. Busca Categorias
                const resCat = await fetch(`${API_URL}?sheet=Categorias`);
                const catData = await resCat.json();
                
                if (catData.length > 0 && !catData.error) {
                    categorias = catData.map(c => c.nome);
                } else {
                    categorias = [...categoriasPadrao];
                }
                renderizarCategorias();

                // 2. Busca Despesas
                const resDesp = await fetch(`${API_URL}?sheet=Despesas`);
                const despData = await resDesp.json();
                
                if (despData.length > 0 && !despData.error) {
                    
                    // Remove linhas em branco que o Excel às vezes cria
                    const linhasValidas = despData.filter(d => d.data && d.categoria);

                    despesas = linhasValidas.map(d => {
                        // BLINDAGEM 1: Arrumar Data caso o Google tenha formatado como DD/MM/YYYY
                        let dataFormatada = d.data;
                        if (dataFormatada.includes('/')) {
                            const partes = dataFormatada.split('/');
                            if (partes.length === 3) {
                                dataFormatada = `${partes[2]}-${partes[1]}-${partes[0]}`;
                            }
                        }

                        // BLINDAGEM 2: Arrumar Moeda caso o Google tenha adicionado vírgulas ou R$
                        let valorNum = String(d.valor || "0");
                        valorNum = valorNum.replace('R$', '').replace(/\s/g, ''); // Tira espaços e símbolo
                        if (valorNum.includes(',')) {
                            // Converte de padrão brasileiro (1.000,50) para padrão javascript (1000.50)
                            valorNum = valorNum.replace(/\./g, '').replace(',', '.');
                        }

                        return {
                            id_virtual: Date.now() + Math.random(), 
                            data_original: d.data, // Guarda exatamente como veio pra não dar erro no "Deletar"
                            data: dataFormatada,   // Usa a data corrigida pro filtro do mês funcionar
                            categoria: d.categoria,
                            valor_original: d.valor, // Guarda exatamente como veio
                            valor: parseFloat(valorNum) || 0 // Transforma no valor limpo
                        };
                    });
                } else {
                    despesas = [];
                }
                
                atualizarGrafico();
            } catch (erro) {
                console.error("Erro no carregamento:", erro);
                document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#8c5353;">Erro ao conectar com a planilha. Verifique a internet.</h3></div>';
            }
        }

        async function forcarAtualizacao() {
            const btn = document.getElementById('btnAtualizar');
            const textoOriginal = btn.innerText;
            
            btn.innerText = "Atualizando... ⏳";
            btn.disabled = true;
            
            document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#8da693;">Carregando dados da planilha... ⏳</h3></div>';
            document.getElementById('historicoValores').innerHTML = '';
            
            await carregarDados();
            
            btn.innerText = textoOriginal;
            btn.disabled = false;
        }

        async function adicionarDespesa() {
            const categoria = document.getElementById('categoria').value;
            const dataInput = document.getElementById('dataDespesa').value;
            const valorInput = document.getElementById('valor').value;
            const valor = parseFloat(valorInput);

            if (!categoria || !dataInput || isNaN(valor) || valor <= 0) return;

            const btn = document.getElementById('btnRegistrar');
            const textoOriginal = btn.innerText;
            btn.innerText = "Registrando... ⏳";
            btn.disabled = true;

            const novaDespesaParaPlanilha = { data: dataInput, categoria: categoria, valor: valor };

            try {
                await fetch(`${API_URL}?sheet=Despesas`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: novaDespesaParaPlanilha })
                });

                // Injeta no aplicativo com a mesma blindagem de "dados originais"
                despesas.push({ 
                    id_virtual: Date.now(), 
                    data_original: dataInput,
                    data: dataInput, 
                    categoria: categoria, 
                    valor_original: valor,
                    valor: valor 
                });
                
                document.getElementById('valor').value = '';
                document.getElementById('mesFiltro').value = dataInput.substring(0, 7);
                atualizarGrafico();
            } catch (erro) {
                alert("Erro ao salvar despesa na planilha.");
            }

            btn.innerText = textoOriginal;
            btn.disabled = false;
        }

        async function apagarLancamento(idVirtualClicado) {
            if (!confirm("Deseja realmente apagar este lançamento?")) return;

            const despesa = despesas.find(d => d.id_virtual === idVirtualClicado);
            if (!despesa) return;

            document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#8da693;">Apagando... ⏳</h3></div>';

            try {
                // Ao deletar, passamos a data original e o valor original exatos do Excel para ele achar a linha
                const urlDelete = `${API_URL}?sheet=Despesas&data=${encodeURIComponent(despesa.data_original)}&categoria=${encodeURIComponent(despesa.categoria)}&valor=${encodeURIComponent(despesa.valor_original)}&limit=1`;
                
                await fetch(urlDelete, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });
                
                despesas = despesas.filter(d => d.id_virtual !== idVirtualClicado);
                atualizarGrafico();
            } catch (erro) {
                alert("Erro ao deletar lançamento na planilha.");
                atualizarGrafico(); 
            }
        }

        async function adicionarCategoria() {
            const input = document.getElementById('novaCategoria');
            const novaCat = input.value.trim();

            if (novaCat === '') return;
            if (categorias.includes(novaCat)) {
                alert("Esta categoria já existe.");
                return;
            }

            const btn = document.getElementById('btnNovaCat');
            btn.innerText = "Salvando... ⏳";
            btn.disabled = true;

            try {
                await fetch(`${API_URL}?sheet=Categorias`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { "nome": novaCat } })
                });

                categorias.push(novaCat);
                input.value = '';
                renderizarCategorias();
                document.getElementById('categoria').value = novaCat;
            } catch (erro) {
                alert("Erro ao salvar categoria na planilha.");
            }

            btn.innerText = "+ Adicionar Categoria";
            btn.disabled = false;
        }

        async function removerCategoria() {
            const select = document.getElementById('categoria');
            const catParaRemover = select.value;

            if (!catParaRemover) return;
            if (!confirm(`Deseja remover a categoria "${catParaRemover}" da lista? \n\nO histórico antigo será mantido.`)) return;

            const btn = document.querySelector('.btn-danger');
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                await fetch(`${API_URL}/nome/${encodeURIComponent(catParaRemover)}?sheet=Categorias`, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });

                categorias = categorias.filter(c => c !== catParaRemover);
                renderizarCategorias();
            } catch (erro) {
                alert("Erro ao remover categoria da planilha.");
            }

            btn.innerText = "✕";
            btn.disabled = false;
        }

        // --- FUNÇÕES DE RENDERIZAÇÃO DE TELA E GRÁFICO ---

        function renderizarCategorias() {
            const select = document.getElementById('categoria');
            select.innerHTML = ''; 
            
            categorias.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        function formatarDataBR(dataISO) {
            if (!dataISO) return "";
            const partes = dataISO.split('-');
            if (partes.length === 3) {
                return `${partes[2]}/${partes[1]}`; 
            }
            return dataISO;
        }

        function atualizarGrafico() {
            const mesSelecionado = document.getElementById('mesFiltro').value;
            
            const despesasFiltradas = despesas.filter(d => {
                return d.data && d.data.startsWith(mesSelecionado);
            });

            despesasFiltradas.sort((a, b) => a.data.localeCompare(b.data));

            const totais = {};
            let totalGeral = 0;

            despesasFiltradas.forEach(d => {
                if (totais[d.categoria]) {
                    totais[d.categoria] += d.valor;
                } else {
                    totais[d.categoria] = d.valor;
                }
            });

            const labels = Object.keys(totais);
            const dados = Object.values(totais);
            const divResumo = document.getElementById('resumoValores');
            const divHistorico = document.getElementById('historicoValores');

            if (grafico) {
                grafico.destroy();
            }

            if (labels.length === 0) {
                divResumo.innerHTML = '<div class="resumo-container"><h3 style="color:#666;">Nenhum gasto registrado neste mês.</h3></div>';
                divHistorico.innerHTML = '';
                return;
            }

            let htmlResumo = '<div class="resumo-container"><h3>Resumo por Categoria</h3><ul class="resumo-lista">';
            for (let cat in totais) {
                htmlResumo += `<li><span>${cat}</span> <span>R$ ${totais[cat].toFixed(2
