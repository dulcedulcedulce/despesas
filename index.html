<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos Simples</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* TEMA ESCURO E MODERNO */
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #aaaaaa;
            --primary-color: #a3c4a9;
            --primary-btn: #4a5c50;
            --primary-btn-hover: #5c7564;
            --danger-color: #d6b4b4;
            --danger-btn: #5c3e3e;
            --danger-btn-hover: #7a5252;
            --input-bg: #2b2b2b;
            --border-color: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--container-bg); 
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            max-width: 500px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }
        
        /* RESUMO GERAL TOPO */
        .resumo-topo {
            background-color: #2c3b31;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid #3d4d42;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        /* CONTAINER CUSTOMIZADO PARA O FILTRO DE MÊS */
        .mes-filtro-container {
            background-color: #1f2922;
            border: 1px solid #4a5c50;
            color: var(--text-color);
            padding: 8px 14px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-width: 120px;
            user-select: none;
        }

        .mes-filtro-container:hover {
            border-color: var(--primary-color);
            background-color: #253329;
        }

        .resumo-topo div.valor {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .flex-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        /* PARCELAMENTO */
        .parcela-group {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .chk-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
        }

        .chk-container label {
            margin: 0;
            cursor: pointer;
            color: var(--text-color);
            font-size: 14px;
        }

        .chk-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="text"], input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
            cursor: pointer;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(163, 196, 169, 0.2);
        }

        input::placeholder {
            color: #666666;
        }
        
        /* BOTÕES */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 5px;
            transition: all 0.2s ease-in-out;
            background-color: var(--primary-btn); 
            color: #ffffff;
        }

        button:hover {
            background-color: var(--primary-btn-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-danger {
            background-color: var(--danger-btn); 
            color: var(--danger-color);
            width: auto;
            margin-top: 0;
            padding: 12px 16px;
        }

        .btn-danger:hover {
            background-color: var(--danger-btn-hover);
            color: #ffffff;
        }

        .btn-cancelar {
            background-color: #444;
            display: none; 
        }

        .btn-cancelar:hover {
            background-color: #555;
        }

        .btn-add {
            background-color: #333333; 
            width: auto;
            margin-top: 0;
            white-space: nowrap;
            color: #ccc;
        }

        .btn-add:hover {
            background-color: #444444;
            color: #fff;
        }
        
        /* Ícones de ação na lista */
        .acoes-item {
            display: flex;
            gap: 8px;
        }

        .btn-excluir-item, .btn-editar-item {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            margin-top: 0;
            width: auto;
            border-radius: 4px;
        }

        .btn-excluir-item {
            color: #cf6679;
        }

        .btn-excluir-item:hover {
            background-color: rgba(207, 102, 121, 0.1);
        }

        .btn-editar-item {
            color: #90caf9;
        }

        .btn-editar-item:hover {
            background-color: rgba(144, 202, 249, 0.1);
        }
        
        .chart-container {
            margin-top: 35px;
        }

        hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 25px 0;
        }
        
        /* RESUMO E LISTA DE VALORES */
        .resumo-container {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--input-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .resumo-container h3 {
            margin-top: 0;
            font-size: 16px;
            color: #cccccc;
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .resumo-lista {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .resumo-lista li {
            padding: 12px 0;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #bbbbbb;
            font-size: 15px;
        }

        .resumo-lista li:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Controle de Gastos</h2>

        <div class="resumo-topo">
            <div class="mes-filtro-container" onclick="document.getElementById('mesFiltro').showPicker()">
                <span id="mesFiltroTexto">⏳</span>
                <input type="month" id="mesFiltro" onchange="atualizarMesTexto(); atualizarGrafico();" style="position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;">
            </div>
            <div class="valor" id="valorTotalTopo">⏳</div>
        </div>

        <div class="form-group">
            <label for="categoria">Categoria:</label>
            <div class="flex-group">
                <select id="categoria"></select>
                <button class="btn-danger" onclick="removerCategoria()" title="Apagar categoria selecionada">✕</button>
            </div>
        </div>

        <div class="form-group">
            <label for="dataDespesa">Data Inicial:</label>
            <input type="date" id="dataDespesa">
        </div>
        
        <div class="form-group parcela-group">
            <div style="flex: 2;">
                <label for="valor">Valor (R$):</label>
                <input type="text" id="valor" oninput="mascaraMoeda(this)" placeholder="0,00">
            </div>
            
            <div class="chk-container">
                <input type="checkbox" id="chkParcelado" onchange="toggleParcelas()">
                <label for="chkParcelado">Parcelado</label>
            </div>

            <div id="divParcelas" style="display: none; flex: 1;">
                <label for="qtdParcelas">Parcelas:</label>
                <input type="number" id="qtdParcelas" min="2" step="1" value="2">
            </div>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição (Opcional):</label>
            <input type="text" id="descricao" placeholder="Ex: Mercado semanal, Uber...">
        </div>

        <div class="flex-group">
            <button id="btnRegistrar" onclick="salvarDespesa()">Registrar Despesa</button>
            <button id="btnCancelarEdicao" class="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
        </div>

        <hr>

        <div class="form-group">
            <button class="btn-add" id="btnMostrarCriarCat" onclick="mostrarCampoCategoria()" style="width: 100%;">+ Adicionar Categoria</button>
            
            <div id="divNovaCategoria" class="flex-group" style="display: none; margin-top: 5px;">
                <input type="text" id="novaCategoria" placeholder="Nova categoria (Ex: Roupas)">
                <button class="btn-add" id="btnNovaCat" onclick="adicionarCategoria()" style="width: auto; margin-top: 0;">Salvar</button>
                <button class="btn-cancelar" onclick="esconderCampoCategoria()" style="display: block; width: auto; margin-top: 0; background-color: #3d3d3d;">✕</button>
            </div>
        </div>

        <hr>

        <div class="chart-container">
            <canvas id="graficoGastos"></canvas>
        </div>

        <div id="resumoValores"></div>
        <div id="historicoValores"></div>

    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/xv2c48l7hux45";

        let despesas = [];
        let categorias = [];
        let grafico = null;
        let idEmEdicao = null; 

        window.onload = async function() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            
            document.getElementById('dataDespesa').value = `${ano}-${mes}-${dia}`;
            document.getElementById('mesFiltro').value = `${ano}-${mes}`;
            
            atualizarMesTexto();

            document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#a3c4a9;">Carregando dados da planilha... ⏳</h3></div>';

            await carregarDados();
        };

        // Função de Diagramação/Máscara de Moeda Dinâmica (R$)
        function mascaraMoeda(campo) {
            let valor = campo.value.replace(/\D/g, "");
            if (valor === "") {
                campo.value = "";
                return;
            }
            valor = (parseInt(valor) / 100).toFixed(2);
            valor = valor.replace(".", Nord = ",");
            valor = valor.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            campo.value = valor;
        }

        // Atualiza visualmente o texto do filtro de mês tirando o "de"
        function atualizarMesTexto() {
            const val = document.getElementById('mesFiltro').value;
            if (!val) return;
            const [ano, mes] = val.split('-');
            const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('mesFiltroTexto').innerText = `${meses[parseInt(mes) - 1]} ${ano}`;
        }

        // Funções de controle do painel de Nova Categoria
        function mostrarCampoCategoria() {
            document.getElementById('btnMostrarCriarCat').style.display = 'none';
            document.getElementById('divNovaCategoria').style.display = 'flex';
            document.getElementById('novaCategoria').focus();
        }

        function esconderCampoCategoria() {
            document.getElementById('btnMostrarCriarCat').style.display = 'block';
            document.getElementById('divNovaCategoria').style.display = 'none';
            document.getElementById('novaCategoria').value = '';
        }

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function toggleParcelas() {
            const isChecked = document.getElementById('chkParcelado').checked;
            document.getElementById('divParcelas').style.display = isChecked ? 'block' : 'none';
        }

        function adicionarMeses(dataOriginal, meses) {
            if (meses === 0) return dataOriginal;
            
            const [anoStr, mesStr, diaStr] = dataOriginal.split('-');
            let ano = parseInt(anoStr);
            let mes = parseInt(mesStr) - 1; 
            let dia = parseInt(diaStr);

            let data = new Date(ano, mes + meses, 1);
            let ultimoDiaDoMesDestino = new Date(ano, mes + meses + 1, 0).getDate();
            let diaAjustado = Math.min(dia, ultimoDiaDoMesDestino);
            data.setDate(diaAjustado);

            const y = data.getFullYear();
            const m = String(data.getMonth() + 1).padStart(2, '0');
            const d = String(data.getDate()).padStart(2, '0');
            
            return `${y}-${m}-${d}`;
        }

        async function carregarDados() {
            try {
                const resCat = await fetch(`${API_URL}?sheet=Categorias`);
                const catData = await resCat.json();
                
                if (catData.length > 0 && !catData.error) {
                    categorias = catData.map(c => c.nome).sort((a, b) => a.localeCompare(b));
                } else {
                    categorias = []; 
                }
                renderizarCategorias();

                const resDesp = await fetch(`${API_URL}?sheet=Despesas`);
                const despData = await resDesp.json();
                
                if (despData.length > 0 && !despData.error) {
                    const linhasValidas = despData.filter(d => d.data && d.categoria);

                    despesas = linhasValidas.map(d => {
                        let dataFormatada = d.data;
                        if (dataFormatada && dataFormatada.includes('/')) {
                            const partes = dataFormatada.split('/');
                            if (partes.length === 3) {
                                dataFormatada = `${partes[2]}-${partes[1]}-${partes[0]}`;
                            }
                        }

                        let valorNum = String(d.valor || "0");
                        valorNum = valorNum.replace('R$', '').replace(/\s/g, ''); 
                        if (valorNum.includes(',')) {
                            valorNum = valorNum.replace(/\./g, '').replace(',', '.');
                        }

                        return {
                            id: d.id, 
                            data: dataFormatada,
                            categoria: d.categoria,
                            descricao: d.descricao || "", 
                            valor: parseFloat(valorNum) || 0 
                        };
                    });
                } else {
                    despesas = [];
                }
                
                atualizarGrafico();
            } catch (erro) {
                console.error("Erro no carregamento:", erro);
                document.getElementById('valorTotalTopo').innerText = "Erro";
                document.getElementById('valorTotalTopo').style.color = "#cf6679";
                document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#cf6679;">Erro ao conectar com a planilha. Verifique a internet.</h3></div>';
            }
        }

        async function salvarDespesa() {
            const categoria = document.getElementById('categoria').value;
            const dataInput = document.getElementById('dataDespesa').value;
            const descricao = document.getElementById('descricao').value.trim();
            const valorInput = document.getElementById('valor').value;
            
            // Tratamento do valor que vem formatado com máscara de texto
            const valor = parseFloat(valorInput.replace(/\./g, '').replace(',', '.'));

            if (!categoria || !dataInput || isNaN(valor) || valor <= 0) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }

            const btnRegistrar = document.getElementById('btnRegistrar');
            const btnCancelar = document.getElementById('btnCancelarEdicao');
            const textoOriginal = btnRegistrar.innerText;
            
            btnRegistrar.innerText = "Salvando... ⏳";
            btnRegistrar.disabled = true;
            btnCancelar.disabled = true;

            try {
                if (idEmEdicao) {
                    const dadosAtualizados = { data: dataInput, categoria: categoria, descricao: descricao, valor: valor };
                    
                    await fetch(`${API_URL}/id/${idEmEdicao}?sheet=Despesas`, {
                        method: 'PUT',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: dadosAtualizados })
                    });

                    const index = despesas.findIndex(d => d.id === idEmEdicao);
                    if (index !== -1) {
                        despesas[index] = { id: idEmEdicao, ...dadosAtualizados };
                    }
                    
                    cancelarEdicao(); 
                } else {
                    const chkParcelado = document.getElementById('chkParcelado').checked;
                    let qtdParcelas = parseInt(document.getElementById('qtdParcelas').value);
                    
                    let novasDespesasParaEnviar = [];

                    if (chkParcelado && qtdParcelas > 1) {
                        let valorPorParcela = valor / qtdParcelas;
                        let idBase = Date.now().toString();

                        for (let i = 0; i < qtdParcelas; i++) {
                            let dataParcela = adicionarMeses(dataInput, i);
                            let textoParcela = `(Parcela ${i + 1}/${qtdParcelas})`;
                            let descFormatada = descricao ? `${descricao} ${textoParcela}` : textoParcela;

                            novasDespesasParaEnviar.push({
                                id: idBase + i, 
                                data: dataParcela,
                                categoria: categoria,
                                descricao: descFormatada,
                                valor: valorPorParcela
                            });
                        }
                    } else {
                        novasDespesasParaEnviar.push({
                            id: Date.now().toString(),
                            data: dataInput,
                            categoria: categoria,
                            descricao: descricao,
                            valor: valor
                        });
                    }

                    await fetch(`${API_URL}?sheet=Despesas`, {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: novasDespesasParaEnviar })
                    });

                    despesas.push(...novasDespesasParaEnviar);
                    
                    document.getElementById('valor').value = '';
                    document.getElementById('descricao').value = ''; 
                    document.getElementById('chkParcelado').checked = false;
                    toggleParcelas();
                }

                document.getElementById('mesFiltro').value = dataInput.substring(0, 7);
                atualizarMesTexto();
                atualizarGrafico();
            } catch (erro) {
                alert("Erro ao salvar despesa na planilha.");
                btnRegistrar.innerText = textoOriginal;
            }

            btnRegistrar.disabled = false;
            btnCancelar.disabled = false;
            if (!idEmEdicao) {
                btnRegistrar.innerText = "Registrar Despesa";
            }
        }

        function carregarEdicao(idClicado) {
            if (!idClicado) {
                alert("Este item é antigo e está sem ID. Não é possível editar por aqui.");
                return;
            }

            const despesa = despesas.find(d => d.id === idClicado);
            if (!despesa) return;

            document.getElementById('categoria').value = despesa.categoria;
            document.getElementById('dataDespesa').value = despesa.data;
            
            // Carrega o valor aplicando a máscara automaticamente na tela
            let valorFormatado = despesa.valor.toFixed(2).replace('.', ',');
            valorFormatado = valorFormatado.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            document.getElementById('valor').value = valorFormatado;
            
            document.getElementById('descricao').value = despesa.descricao || '';

            idEmEdicao = idClicado;

            const btnRegistrar = document.getElementById('btnRegistrar');
            btnRegistrar.innerText = "Salvar Alterações";
            btnRegistrar.style.backgroundColor = "#5c7080"; 
            document.getElementById('btnCancelarEdicao').style.display = "block";

            document.getElementById('chkParcelado').disabled = true;
            document.getElementById('chkParcelado').checked = false;
            toggleParcelas();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicao() {
            idEmEdicao = null;
            document.getElementById('valor').value = '';
            document.getElementById('descricao').value = '';
            
            const btnRegistrar = document.getElementById('btnRegistrar');
            btnRegistrar.innerText = "Registrar Despesa";
            btnRegistrar.style.backgroundColor = "var(--primary-btn)";
            document.getElementById('btnCancelarEdicao').style.display = "none";
            document.getElementById('chkParcelado').disabled = false;
        }

        async function apagarLancamento(idClicado) {
            if (!confirm("Deseja realmente apagar este lançamento?")) return;

            if (!idClicado) {
                alert("Este item é antigo e está sem ID. Por favor, apague-o diretamente no seu Excel.");
                return;
            }

            const despesa = despesas.find(d => d.id === idClicado);
            if (!despesa) return;

            document.getElementById('resumoValores').innerHTML = '<div class="resumo-container"><h3 style="color:#a3c4a9;">Apagando... ⏳</h3></div>';

            try {
                const urlDelete = `${API_URL}/id/${idClicado}?sheet=Despesas`;
                
                await fetch(urlDelete, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });
                
                despesas = despesas.filter(d => d.id !== idClicado);
                
                if (idEmEdicao === idClicado) cancelarEdicao();
                
                atualizarGrafico();
            } catch (erro) {
                alert("Erro ao deletar lançamento na planilha.");
                atualizarGrafico(); 
            }
        }

        async function adicionarCategoria() {
            const input = document.getElementById('novaCategoria');
            const novaCat = input.value.trim();

            if (novaCat === '') return;
            if (categorias.includes(novaCat)) {
                alert("Esta categoria já existe.");
                return;
            }

            const btn = document.getElementById('btnNovaCat');
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                await fetch(`${API_URL}?sheet=Categorias`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { "nome": novaCat } })
                });

                categorias.push(novaCat);
                categorias.sort((a, b) => a.localeCompare(b)); 
                input.value = '';
                renderizarCategorias();
                document.getElementById('categoria').value = novaCat;
                esconderCampoCategoria(); // Esconde o campo após adicionar com sucesso
            } catch (erro) {
                alert("Erro ao salvar categoria na planilha.");
            }

            btn.innerText = "Salvar";
            btn.disabled = false;
        }

        async function removerCategoria() {
            const select = document.getElementById('categoria');
            const catParaRemover = select.value;

            if (!catParaRemover) return;
            if (!confirm(`Deseja remover a categoria "${catParaRemover}" da lista? \n\nO histórico antigo será mantido.`)) return;

            const btn = document.querySelector('.btn-danger');
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                await fetch(`${API_URL}/nome/${encodeURIComponent(catParaRemover)}?sheet=Categorias`, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });

                categorias = categorias.filter(c => c !== catParaRemover);
                renderizarCategorias();
            } catch (erro) {
                alert("Erro ao remover categoria da planilha.");
            }

            btn.innerText = "✕";
            btn.disabled = false;
        }

        function renderizarCategorias() {
            const select = document.getElementById('categoria');
            select.innerHTML = ''; 
            
            categorias.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        function formatarDataBR(dataISO) {
            if (!dataISO) return "";
            const partes = dataISO.split('-');
            if (partes.length === 3) {
                return `${partes[2]}/${partes[1]}`; 
            }
            return dataISO;
        }

        function atualizarGrafico() {
            const mesSelecionado = document.getElementById('mesFiltro').value;
            
            const despesasFiltradas = despesas.filter(d => {
                return d.data && d.data.startsWith(mesSelecionado);
            });

            despesasFiltradas.sort((a, b) => {
                let diffDate = b.data.localeCompare(a.data);
                if (diffDate === 0 && a.id && b.id) {
                    return b.id.localeCompare(a.id);
                }
                return diffDate;
            });

            const totais = {};
            
            despesasFiltradas.forEach(d => {
                if (totais[d.categoria]) {
                    totais[d.categoria] += d.valor;
                } else {
                    totais[d.categoria] = d.valor;
                }
            });

            let totaisArray = Object.keys(totais).map(cat => {
                return { categoria: cat, valor: totais[cat] };
            });
            totaisArray.sort((a, b) => b.valor - a.valor);

            const divResumo = document.getElementById('resumoValores');
            const divHistorico = document.getElementById('historicoValores');
            
            if (grafico) {
                grafico.destroy();
            }

            if (totaisArray.length === 0) {
                document.getElementById('valorTotalTopo').innerText = "R$ 0,00";
                divResumo.innerHTML = '<div class="resumo-container"><h3 style="color:#888;">Nenhum gasto registrado neste mês.</h3></div>';
                divHistorico.innerHTML = '';
                return;
            }

            let totalGeral = 0;
            let htmlResumo = '<div class="resumo-container"><h3>Resumo por Categoria</h3><ul class="resumo-lista">';
            
            totaisArray.forEach(item => {
                htmlResumo += `<li><span>${item.categoria}</span> <strong>R$ ${formatarMoeda(item.valor)}</strong></li>`;
                totalGeral += item.valor;
            });
            htmlResumo += `</ul></div>`;
            divResumo.innerHTML = htmlResumo;

            document.getElementById('valorTotalTopo').innerText = `R$ ${formatarMoeda(totalGeral)}`;

            let htmlHistorico = '<div class="resumo-container" style="margin-top: 15px;"><h3>Lançamentos do Mês</h3><ul class="resumo-lista">';
            despesasFiltradas.forEach(d => {
                const dataExibicao = formatarDataBR(d.data);
                const idParaPassar = d.id ? `'${d.id}'` : `null`;
                const textoDescricao = d.descricao ? ` - <span style="color:#888">${d.descricao}</span>` : '';

                htmlHistorico += `
                    <li style="flex-direction: column; align-items: flex-start; gap: 8px;">
                        <div style="display: flex; justify-content: space-between; width: 100%;">
                            <span style="color: #bbb; font-size: 13px;">📅 ${dataExibicao} &bull; <strong>${d.categoria}</strong>${textoDescricao}</span> 
                            <div class="acoes-item">
                                <button class="btn-editar-item" onclick="carregarEdicao(${idParaPassar})" title="Editar este gasto">✎</button>
                                <button class="btn-excluir-item" onclick="apagarLancamento(${idParaPassar})" title="Apagar este gasto">✕</button>
                            </div>
                        </div>
                        <div style="font-size: 17px; color: #dfdfdf; font-weight: bold;">
                            R$ ${formatarMoeda(d.valor)}
                        </div>
                    </li>`;
            });
            htmlHistorico += '</ul></div>';
            divHistorico.innerHTML = htmlHistorico;

            const labelsGrafico = totaisArray.map(item => item.categoria);
            const dadosGrafico = totaisArray.map(item => item.valor);

            const ctx = document.getElementById('graficoGastos').getContext('2d');
            Chart.defaults.color = '#a0a0a0'; 

            grafico = new Chart(ctx, {
                type: 'doughnut', 
                data: {
                    labels: labelsGrafico,
                    datasets: [{
                        data: dadosGrafico,
                        backgroundColor: [
                            '#6b7a8f', '#a88c7d', '#7d8a7a', '#8a7a85', '#607475', '#7a6a78',
                            '#857362', '#6a8581', '#7a647d', '#856262', '#5b6375', '#6a7860'
                        ],
                        borderColor: '#1e1e1e',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '65%', 
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#e0e0e0', padding: 20, font: { size: 13 } } },
                        tooltip: { 
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 14 },
                            bodyFont: { size: 14 },
                            padding: 12,
                            callbacks: { 
                                label: function(context) { 
                                    let label = context.label || ''; 
                                    if (label) label += ': '; 
                                    if (context.parsed !== null) { 
                                        label += 'R$ ' + formatarMoeda(context.parsed); 
                                    } 
                                    return label; 
                                } 
                            } 
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
